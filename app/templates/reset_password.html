{% extends "layout.html" %}

{% block content %}
<div class="login-container">
  <h2>🔑 Quên mật khẩu</h2>
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" placeholder="Nhập email đã đăng ký" required>
    <button type="submit">Gửi liên kết khôi phục</button>
  </form>
  <p><a href="{{ url_for('auth.login') }}">← Quay lại đăng nhập</a></p>
</div>
{% endblock %}
